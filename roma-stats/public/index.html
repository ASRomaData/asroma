<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>AS Roma Stats</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #0b0b0b;
      color: white;
      text-align: center;
      padding: 20px;
    }

    h1 {
      color: #ff3b3b;
    }

    .card {
      background: #1e1e1e;
      padding: 20px;
      border-radius: 12px;
      max-width: 420px;
      margin: auto;
    }

    .stat {
      margin: 10px 0;
      font-size: 18px;
    }

    .reload {
      margin-top: 15px;
      padding: 10px;
      border: none;
      border-radius: 8px;
      background: #ff3b3b;
      color: white;
      font-weight: bold;
      cursor: pointer;
    }
  </style>
</head>
<body>

  <h1>🔴 AS Roma</h1>

  <div class="card" id="app">
    Caricamento...
  </div>

  <button class="reload" onclick="load()">🔄 Aggiorna</button>

  <script>
    async function load() {
      const el = document.getElementById("app");
      el.innerHTML = "Caricamento...";

      try {
        const res = await fetch("/api/match");
        const data = await res.json();

        if (data.error) {
          el.innerHTML = "❌ Nessuna partita trovata";
          return;
        }

        el.innerHTML = `
          <h2>${data.match}</h2>
          <div class="stat">⚽ Tiri: ${data.shots}</div>
          <div class="stat">🎯 In porta: ${data.onTarget}</div>
          <div class="stat">📊 xG: ${data.xg}</div>
          <div class="stat">⏳ Possesso: ${data.possession}</div>
          <div class="stat">🎯 Passaggi: ${data.passes}</div>
        `;
      } catch {
        el.innerHTML = "❌ Errore caricamento dati";
      }
    }

    load();
  </script>

</body>
</html>
